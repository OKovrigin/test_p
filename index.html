<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приветствие</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000010;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 40, 120, 0.6) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(0, 10, 80, 0.8) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(0, 80, 200, 0.3) 0%, transparent 50%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Animated grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 100, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 100, 255, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      pointer-events: none;
    }

    /* Neon horizontal line */
    body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 140, 255, 0.4), transparent);
      pointer-events: none;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      font-family: 'Cinzel', 'Times New Roman', serif;
      font-size: 0.9rem;
      letter-spacing: 0.6em;
      color: rgba(80, 160, 255, 0.7);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeIn 2s ease forwards;
    }

    h1 {
      font-family: 'Cinzel', 'Times New Roman', serif;
      font-size: 3.6rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      line-height: 1.2;
      color: #fff;
      text-shadow:
        0 0 10px rgba(80, 160, 255, 0.9),
        0 0 30px rgba(0, 100, 255, 0.7),
        0 0 70px rgba(0, 60, 200, 0.5),
        0 0 120px rgba(0, 40, 160, 0.3);
      animation: fadeIn 2s ease forwards, pulse 4s ease-in-out infinite;
    }

    .line {
      width: 260px;
      height: 1px;
      margin: 1.8rem auto 0;
      background: linear-gradient(90deg, transparent, rgba(0, 140, 255, 0.8), transparent);
      animation: fadeIn 2.5s ease forwards;
    }

    .line::before, .line::after {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(0, 160, 255, 0.9);
      box-shadow: 0 0 10px rgba(0, 140, 255, 1);
      position: absolute;
      top: -2.5px;
    }
    .line::before { left: calc(50% - 130px); }
    .line::after  { right: calc(50% - 130px); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 10px rgba(80,160,255,0.9), 0 0 30px rgba(0,100,255,0.7), 0 0 70px rgba(0,60,200,0.5); }
      50%       { text-shadow: 0 0 16px rgba(80,180,255,1),   0 0 50px rgba(0,120,255,0.9), 0 0 100px rgba(0,80,220,0.7); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="subtitle">Добро пожаловать</div>
    <h1>Приветствую,<br>Олег</h1>
    <div class="line"></div>
  </div>
</body>
</html>
